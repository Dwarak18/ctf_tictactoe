<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impossible Tic-Tac-Toe</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card">
        <p class="eyebrow">Hiring Game</p>
        <h1>Impossible Tic-Tac-Toe</h1>
        <p class="subtitle">Can you defeat our unbeatable AI and claim the reward?</p>

        <div class="board-shell">
          <div class="board" id="board" aria-label="Tic-Tac-Toe board"></div>
        </div>

        <p class="status" id="status" aria-live="polite">Your turn (X)</p>

        <div class="actions">
          <button id="resetBtn" type="button">Reset Game</button>
        </div>
      </section>
    </main>

    <script src="/game.js"></script>
  </body>
</html>
